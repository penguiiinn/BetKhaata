<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium dark red gradient for cricket ball -->
    <radialGradient id="ballGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF4B62"/>
      <stop offset="50%" stop-color="#D31D38"/>
      <stop offset="100%" stop-color="#700614"/>
    </radialGradient>
    
    <!-- Gold gradient for rupee symbol & seam -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE17D"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#B26E00"/>
    </linearGradient>
    
    <!-- Drop shadow for the gold text -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Ball -->
  <circle cx="256" cy="256" r="230" fill="url(#ballGrad)" stroke="#1A0306" stroke-width="4"/>

  <!-- Gold Seam Stitching (Cricket ball characteristics) -->
  <path d="M 126 126 C 200 210, 200 302, 126 386" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="10 6" opacity="0.8"/>
  <path d="M 386 126 C 312 210, 312 302, 386 386" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="10 6" opacity="0.8"/>

  <!-- Rupee Symbol Group with Gold Gradient & Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Custom drawn Rupee '₹' symbol -->
    <path d="M 180 150 
             L 340 150 
             M 180 200 
             L 320 200 
             M 230 150 
             L 230 270 
             C 300 270, 330 330, 330 380
             M 230 260 
             C 180 240, 180 170, 230 160
             M 200 270
             L 320 390" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
